<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // --- DATA ---
    const VOCAB_DATA = [
      { id: 'v1', word: 'Last weekend', matchId: 'd1', icon: 'fa-regular fa-calendar' },
      { id: 'v2', word: 'Mountain', matchId: 'd2', icon: 'fa-solid fa-mountain' },

    const DEFINITIONS = [

      { id: 'd3', text: 'A piece of clothing worn on the upper body' },

      { id: 'd6', text: 'A place where people drink coffee and eat snacks' },

    const MCQ_DATA = [
      { q: "Where did Max go last weekend?", options: ["To the beach", "To the mountains", "To a museum", "To the mall"], correct: 1 },
      { q: "Why did Max and his brother run back?", options: ["It got dark", "They were tired", "It started raining and they had no jackets", "They saw a bear"], correct: 2 },
      { q: "What did they buy?", options: ["Coffee", "Hot chocolate", "Sandwiches", "A map"], correct: 1 },
      { q: "What happened inside the café?", options: ["Max lost his keys", "They met a friend", "The power went out", "They dropped their drinks"], correct: 0 },
      { q: "What advice did Sarah give?", options: ["Don't go to the mountains", "Check your pockets and the weather", "Buy a better jacket", "Stay home next time"], correct: 1 },
    ];

    const TIMELINE_EVENTS = [
      { id: 't1', text: 'Max went to the mountains.', order: 1 },
      { id: 't2', text: 'It started raining.', order: 2 },
      { id: 't3', text: 'They ran back.', order: 3 },
      { id: 't4', text: 'They entered a café.', order: 4 },
      { id: 't5', text: 'They bought hot chocolate.', order: 5 },
      { id: 't6', text: 'They talked for hours.', order: 6 },
    ];

    const STORY_SCRIPT = [
      { speaker: 'Sarah', text: "Hey Max, how was your trip? Did you go to the mountains like you planned?" },
      { speaker: 'Max', text: "Hey Sarah! Yes, we went to the mountains last weekend. First, it was great. The weather was perfect." },
      { speaker: 'Sarah', text: "That sounds awesome. Did you hike to the top?" },
      { speaker: 'Max', text: "Almost! But suddenly, it started raining really hard. And guess what? We didn't have our jackets!" },
      { speaker: 'Sarah', text: "Oh no! So what did you do?" },
      { speaker: 'Max', text: "We ran back down the trail as fast as we could. Then, we found a small café near the road." },
      { speaker: 'Sarah', text: "That was lucky. Did you go inside?" },
      { speaker: 'Max', text: "Yes, we went inside and bought some hot chocolate. But then, I realized I lost my car keys!" },
      { speaker: 'Sarah', text: "You lost them? Where?" },
      { speaker: 'Max', text: "I panicked! But in the end, they were just in my other pocket. We laughed and talked for hours in the café until the rain stopped." },
      { speaker: 'Sarah', text: "Wow, what an adventure. Next time, check your pockets and check the weather!" }
    ];

    const WORDS_TO_SORT = [
      { id: 'w1', word: 'started', type: 'regular' },
      { id: 'w2', word: 'talked', type: 'regular' },
      { id: 'w3', word: 'went', type: 'irregular' },
      { id: 'w4', word: 'bought', type: 'irregular' },
      { id: 'w5', word: 'first', type: 'connector' },
      { id: 'w6', word: 'suddenly', type: 'connector' },
      { id: 'w7', word: 'in the end', type: 'connector' },
    ];

    // --- FUNCIONES HELPER GEMINI API ---
    const callGemini = async (prompt, isJson = false) => {
      const apiKey = ""; // Entorno provee la clave, insertar manual si se ejecuta en local
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "Eres un profesor de inglés amigable y experto para estudiantes de nivel A2." }] }
      };
      
      if (isJson) {
        payload.generationConfig = { 
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              score: { type: "INTEGER" },
              feedback: { type: "STRING" },
              corrections: { type: "STRING" }
            }
          }
        };
      }

      let delay = 1000;
      for (let i = 0; i < 5; i++) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error("No text returned");
          return isJson ? JSON.parse(text) : text;
        } catch (err) {
          if (i === 4) throw err;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    };

    // --- COMPONENTES UI ---

    const Confetti = ({ active }) => {
      if (!active) return null;
      return (
        <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden flex justify-center">
          {[...Array(50)].map((_, i) => (
            <div 
              key={i}
              className="absolute animate-confetti w-3 h-3 rounded-sm"
              style={{
                left: `${Math.random() * 100}%`,
                top: `-5%`,
                backgroundColor: ['#4F46E5', '#06B6D4', '#10B981', '#F59E0B', '#ef4444'][Math.floor(Math.random() * 5)],
                animationDelay: `${Math.random() * 2}s`,
                animationDuration: `${2 + Math.random() * 3}s`
              }}
            />
          ))}
        </div>
      );
    };

    const Card = ({ children, className = "" }) => (
      <div className={`bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 p-6 ${className}`}>
        {children}
      </div>
    );

    const Button = ({ children, onClick, variant = 'primary', className = "", disabled = false }) => {
      const baseStyle = "px-6 py-3 rounded-xl font-bold transition-all duration-200 transform active:scale-95 flex items-center justify-center gap-2";
      const variants = {
        primary: "bg-indigo-600 hover:bg-indigo-700 text-white shadow-md shadow-indigo-200 dark:shadow-none disabled:opacity-50",
        secondary: "bg-cyan-500 hover:bg-cyan-600 text-white shadow-md shadow-cyan-200 dark:shadow-none disabled:opacity-50",
        success: "bg-emerald-500 hover:bg-emerald-600 text-white shadow-md shadow-emerald-200 dark:shadow-none disabled:opacity-50",
        ai: "bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 text-white shadow-md shadow-purple-200 dark:shadow-none disabled:opacity-50",
        outline: "border-2 border-slate-200 hover:border-indigo-500 text-slate-700 dark:text-slate-300 dark:border-slate-600 dark:hover:border-indigo-400"
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant] || variants.primary} ${className}`}>
          {children}
        </button>
      );
    };

    // --- MAIN APP COMPONENT ---

    function App() {
      const [deviceView, setDeviceView] = useState('desktop');
      const [theme, setTheme] = useState('light');
      const [soundEnabled, setSoundEnabled] = useState(true);
      const [currentScreen, setCurrentScreen] = useState('home');
      const [xp, setXp] = useState(0);
      const [badges, setBadges] = useState([]);
      const [showConfetti, setShowConfetti] = useState(false);
      const [toastMsg, setToastMsg] = useState('');

      // Estados de Audio
      const [isPlaying, setIsPlaying] = useState(false);
      const [audioProgress, setAudioProgress] = useState(0);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [currentLineIndex, setCurrentLineIndex] = useState(-1);

      // Estados de Actividades
      const [vocabMatches, setVocabMatches] = useState({});
      const [pre1SelectedWord, setPre1SelectedWord] = useState(null);
      const [predictions, setPredictions] = useState([]);
      const [mcqAnswers, setMcqAnswers] = useState({});
      const [timelineOrder, setTimelineOrder] = useState([...TIMELINE_EVENTS].sort(() => Math.random() - 0.5));
      const [foundKeywords, setFoundKeywords] = useState([]);
      const [reflections, setReflections] = useState({ q1: '', q2: '', q3: '' });
      const [sortedWords, setSortedWords] = useState({ regular: [], irregular: [], connector: [] });
      const [post2SelectedWord, setPost2SelectedWord] = useState(null);
      const [availableVoices, setAvailableVoices] = useState([]);
      const [adventureText, setAdventureText] = useState({ p1: '', p2: '', p3: '', p4: '' });
      
      // Estados para características de IA
      const [isGeneratingAi, setIsGeneratingAi] = useState(false);
      const [aiEvaluation, setAiEvaluation] = useState(null);
      const [isExtendingStory, setIsExtendingStory] = useState(false);
      const [aiExtendedStory, setAiExtendedStory] = useState(null);

      useEffect(() => {
        const loadVoices = () => {
          setAvailableVoices(window.speechSynthesis.getVoices());
        };
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      // Tema Oscuro
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // Efectos de Sonido
      const playSound = useCallback((type) => {
        if (!soundEnabled) return;
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (type === 'success') {
          const t = ctx.currentTime;
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, t); 
          osc.frequency.setValueAtTime(659.25, t + 0.1); 
          osc.frequency.setValueAtTime(783.99, t + 0.2); 
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
          gain.gain.linearRampToValueAtTime(0, t + 0.4);
          osc.start(t);
          osc.stop(t + 0.4);
        } else if (type === 'error') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(200, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.5, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        }
      }, [soundEnabled]);

      const showToast = (msg, points = 0) => {
        if (points > 0) {
          setXp(prev => prev + points);
          msg = `${msg} (+${points} XP)`;
          playSound('success');
        }
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      const triggerConfetti = () => {
        setShowConfetti(true);
        setTimeout(() => setShowConfetti(false), 4000);
      };

      const awardBadge = (badgeName) => {
        if (!badges.includes(badgeName)) {
          setBadges(prev => [...prev, badgeName]);
          showToast(`🏆 ¡Insignia Desbloqueada: ${badgeName}!`, 50);
          triggerConfetti();
        }
      };

      const getContainerClass = () => {
        switch (deviceView) {
          case 'mobile': return 'max-w-[375px] mx-auto border-x-4 border-slate-800 rounded-3xl h-[800px] overflow-y-auto shadow-2xl';
          case 'tablet': return 'max-w-[768px] mx-auto border-x-4 border-slate-800 rounded-3xl min-h-screen shadow-2xl';
          default: return 'max-w-6xl mx-auto min-h-screen';
        }
      };

      // --- PANTALLAS ---

      const renderHome = () => (
        <div className="flex flex-col items-center justify-center space-y-8 text-center animate-fade-in py-12">
          <div className="w-32 h-32 bg-indigo-100 dark:bg-indigo-900 rounded-full flex items-center justify-center mb-4 shadow-inner">
            <i className="fa-solid fa-map text-5xl text-indigo-600 dark:text-indigo-400"></i>
          </div>
          <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-cyan-500">
            Past Adventures
          </h1>
          <p className="text-xl text-slate-600 dark:text-slate-300 max-w-md">
            Mejora tus habilidades de escucha y aprende los tiempos narrativos a través de historias de la vida real.
          </p>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-lg mt-8">
            <Button onClick={() => setCurrentScreen('pre-1')} className="w-full text-lg py-4">
              <i className="fa-solid fa-play"></i> Empezar Lección
            </Button>
            <Button variant="secondary" onClick={() => setCurrentScreen('dashboard')} className="w-full text-lg py-4">
              <i className="fa-solid fa-chart-line"></i> Mi Progreso
            </Button>
          </div>
        </div>
      );

      const renderPre1 = () => {
        const isComplete = Object.keys(vocabMatches).length === VOCAB_DATA.length;

        const handleWordClick = (id) => {
          if (Object.values(vocabMatches).includes(id)) return;
          setPre1SelectedWord(id === pre1SelectedWord ? null : id);
        };

        const handleDefClick = (defId) => {
          if (!pre1SelectedWord) return;
          
          const wordObj = VOCAB_DATA.find(w => w.id === pre1SelectedWord);
          if (wordObj.matchId === defId) {
            const newMatches = { ...vocabMatches, [defId]: pre1SelectedWord };
            setVocabMatches(newMatches);
            setPre1SelectedWord(null);
            showToast("¡Pareja Correcta!", 10);
            
            if (Object.keys(newMatches).length === VOCAB_DATA.length) {
              awardBadge('Story Explorer');
            }
          } else {
            playSound('error');
            setPre1SelectedWord(null);
          }
        };

        return (
          <div className="space-y-6 animate-fade-in">
            <div className="text-center">
              <h2 className="text-2xl font-bold text-indigo-700 dark:text-indigo-400">Pre-Listening: Reto de Vocabulario</h2>
              <p className="text-slate-600 dark:text-slate-400 mt-2 bg-indigo-50 dark:bg-slate-800 p-3 rounded-lg border border-indigo-100 dark:border-slate-700">
                <strong>Instrucciones:</strong> Antes de escuchar el audio, toca una palabra y luego toca su significado. Estas palabras te ayudarán a entender la historia.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="space-y-3">
                <h3 className="font-bold text-slate-700 dark:text-slate-300">Palabras (Toca para seleccionar)</h3>
                <div className="flex flex-wrap gap-3">
                  {VOCAB_DATA.map(v => {
                    const isMatched = Object.values(vocabMatches).includes(v.id);
                    const isSelected = pre1SelectedWord === v.id;
                    return (
                      <button
                        key={v.id}
                        onClick={() => handleWordClick(v.id)}
                        disabled={isMatched}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl border-2 transition-all duration-200 font-semibold
                          ${isMatched ? 'bg-slate-100 border-slate-200 text-slate-400 opacity-50 dark:bg-slate-800 dark:border-slate-700' : 
                            isSelected ? 'bg-indigo-100 border-indigo-500 text-indigo-700 scale-105 shadow-md' : 
                            'bg-white border-slate-200 text-slate-700 hover:border-indigo-300 dark:bg-slate-700 dark:border-slate-600 dark:text-white'}`}
                      >
                        <i className={v.icon + " text-sm"}></i> {v.word}
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="space-y-3">
                <h3 className="font-bold text-slate-700 dark:text-slate-300">Significados (Toca para emparejar)</h3>
                <div className="flex flex-col gap-3">
                  {DEFINITIONS.map(d => {
                    const matchedWordId = vocabMatches[d.id];
                    const matchedWord = matchedWordId ? VOCAB_DATA.find(w => w.id === matchedWordId) : null;
                    
                    return (
                      <button
                        key={d.id}
                        onClick={() => handleDefClick(d.id)}
                        disabled={!!matchedWordId}
                        className={`text-left p-4 rounded-xl border-2 transition-all duration-200 w-full flex items-center justify-between
                          ${matchedWordId ? 'bg-emerald-50 border-emerald-400 dark:bg-emerald-900/30 dark:border-emerald-700' : 
                            pre1SelectedWord ? 'bg-white border-dashed border-indigo-300 hover:bg-indigo-50 dark:bg-slate-800' : 
                            'bg-slate-50 border-slate-200 dark:bg-slate-800 dark:border-slate-700'}`}
                      >
                        <span className="text-slate-700 dark:text-slate-300">{d.text}</span>
                        {matchedWord && (
                          <span className="flex items-center gap-1 text-emerald-600 font-bold bg-white px-2 py-1 rounded-md shadow-sm text-sm">
                            <i className={matchedWord.icon + " text-xs"}></i> {matchedWord.word}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="flex justify-end mt-8 pt-4 border-t border-slate-200 dark:border-slate-700">
              <Button 
                onClick={() => setCurrentScreen('pre-2')} 
                variant={isComplete ? 'success' : 'outline'}
              >
                {isComplete ? 'Siguiente Actividad' : 'Omitir Actividad'} <i className="fa-solid fa-arrow-right ml-1"></i>
              </Button>
            </div>
          </div>
        );
      };

      const renderPre2 = () => {
        const opts = [
          { text: "It was sunny all day.", icon: "fa-solid fa-sun" },
          { text: "Something unexpected happened.", icon: "fa-solid fa-bolt" },
          { text: "They got lost.", icon: "fa-solid fa-map" },
          { text: "They saw a wild animal.", icon: "fa-solid fa-eye" }
        ];
        
        const togglePrediction = (optText) => {
          setPredictions(prev => 
            prev.includes(optText) ? prev.filter(p => p !== optText) : [...prev, optText]
          );
        };

        const CloudSVG = ({className}) => (
          <svg className={className} viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.5 19c-2.48 0-4.5-2.02-4.5-4.5 0-.17.01-.34.03-.5A5.5 5.5 0 0 0 3 14.5C3 17.53 5.47 20 8.5 20h9c2.76 0 5-2.24 5-5s-2.24-5-5-5c-.17 0-.34.01-.5.03A4.5 4.5 0 0 0 17.5 19z" />
          </svg>
        );

        return (
          <div className="space-y-6 animate-fade-in max-w-2xl mx-auto text-center">
            <h2 className="text-2xl font-bold text-indigo-700 dark:text-indigo-400">Predicción de la Historia</h2>
            
            <div className="relative w-full h-48 md:h-64 rounded-2xl overflow-hidden shadow-lg border-4 border-white dark:border-slate-700 bg-gradient-to-b from-blue-300 to-indigo-800">
              <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-200 via-slate-400 to-slate-600 dark:from-slate-700 dark:to-slate-900 opacity-20"></div>
              <i className="fa-solid fa-mountain absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-7xl text-white opacity-90"></i>
              <CloudSVG className="absolute top-4 right-8 w-16 h-16 text-white opacity-80 animate-pulse" />
              <CloudSVG className="absolute top-12 left-12 w-12 h-12 text-white opacity-60" />
            </div>

            <Card className="mt-8">
              <p className="text-lg font-semibold text-slate-700 dark:text-slate-300 mb-4">
                Mira la imagen y el título "Past Adventures". ¿Qué crees que sucedió durante el viaje de Max?
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
                {opts.map((opt, i) => {
                  const isSelected = predictions.includes(opt.text);
                  return (
                    <div 
                      key={i} 
                      onClick={() => togglePrediction(opt.text)}
                      className={`flex flex-col items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all duration-200 ${isSelected ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/30' : 'border-slate-200 bg-slate-50 hover:bg-slate-100 dark:border-slate-700 dark:bg-slate-800'}`}
                    >
                      <i className={`${opt.icon} text-3xl mb-2 ${isSelected ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-500'}`}></i>
                      <span className={`text-center font-medium ${isSelected ? 'text-indigo-700 dark:text-indigo-300' : 'text-slate-700 dark:text-slate-300'}`}>{opt.text}</span>
                    </div>
                  );

              </div>
              <div className="mt-6 flex justify-end">
                <Button onClick={() => {
                  if (predictions.length > 0) showToast("¡Predicciones guardadas! ¡Excelente!", 10);

                }}>
                  Ir al Audio <i className="fa-solid fa-arrow-right ml-1"></i>
                </Button>
              </div>
            </Card>
          </div>
        );
      };

      const renderAudioPlayer = () => {
        const startAudio = () => {
          if (isPlaying) return;
          setIsPlaying(true);
          setAudioProgress(0);
          setCurrentLineIndex(0);
          
          let index = 0;
          const playNextLine = () => {
            if (index >= STORY_SCRIPT.length) {
              setIsPlaying(false);
              awardBadge('Listening Detective');
              showToast("¡Audio terminado! Asegúrate de completar las actividades.", 10);
              return;
            }
            
            setCurrentLineIndex(index);
            setAudioProgress(((index + 1) / STORY_SCRIPT.length) * 100);
            
            if ('speechSynthesis' in window) {
              const utterance = new SpeechSynthesisUtterance(STORY_SCRIPT[index].text);
              utterance.rate = playbackRate * 0.85; 
              
              const enVoices = availableVoices.filter(v => v.lang.startsWith('en'));
              
              if (STORY_SCRIPT[index].speaker === 'Sarah') {
                const femaleVoice = enVoices.find(v => v.name.includes('Samantha') || v.name.includes('Google US English') || v.name.includes('Zira') || v.name.includes('Female')) || enVoices[0];
                if (femaleVoice) utterance.voice = femaleVoice;
                utterance.pitch = 1.1; 
              } else {
                const maleVoice = enVoices.find(v => v.name.includes('Alex') || v.name.includes('David') || v.name.includes('Google UK English Male') || v.name.includes('Male')) || enVoices[1] || enVoices[0];
                if (maleVoice) utterance.voice = maleVoice;
                utterance.pitch = 0.95; 
              }
              
              utterance.onend = () => {
                index++;
                setTimeout(playNextLine, 600); 
              };
              window.speechSynthesis.speak(utterance);
            } else {
              setTimeout(() => {
                index++;
                playNextLine();
              }, 3000 / playbackRate);
            }
          };
          
          playNextLine();
        };

        const stopAudio = () => {
          setIsPlaying(false);
          window.speechSynthesis?.cancel();
        };

        const targetKeywords = ['suddenly', 'jacket', 'mountain', 'café', 'hot chocolate'];
        const handleKeywordClick = (word) => {
          const cleanWord = word.toLowerCase().replace(/[.,!?]/g, '');
          const matchedTarget = targetKeywords.find(t => cleanWord.includes(t) || t.includes(cleanWord));
          
          if (matchedTarget && !foundKeywords.includes(matchedTarget)) {
            setFoundKeywords([...foundKeywords, matchedTarget]);
            showToast(`¡Increíble! Palabra encontrada: ${matchedTarget}`, 15);
          }
        };

        const handleAnswer = (qIndex, optIndex) => {
          setMcqAnswers({ ...mcqAnswers, [qIndex]: optIndex });
          if (MCQ_DATA[qIndex].correct === optIndex) {
            showToast("¡Correcto! ¡Buen trabajo!", 20);
          } else {
            playSound('error');
            setToastMsg("Ups, eso no es del todo correcto. ¡Intenta escuchar de nuevo!");
            setTimeout(() => setToastMsg(''), 3000);
          }
        };

        const moveItem = (index, direction) => {
          const newOrder = [...timelineOrder];
          if (direction === 'up' && index > 0) {
            [newOrder[index - 1], newOrder[index]] = [newOrder[index], newOrder[index - 1]];
          } else if (direction === 'down' && index < newOrder.length - 1) {
            [newOrder[index + 1], newOrder[index]] = [newOrder[index], newOrder[index + 1]];
          }
          setTimelineOrder(newOrder);
        };

        const checkTimelineOrder = () => {
          const isCorrect = timelineOrder.every((item, i) => item.order === i + 1);
          if (isCorrect) {
            showToast("¡Orden Perfecto! Lo has logrado.", 30);
          } else {
            playSound('error');
            setToastMsg("Algunos elementos no están en el orden correcto aún. ¡Sigue intentando!");
            setTimeout(() => setToastMsg(''), 3000);
          }
        };

        const isTimelineCorrect = timelineOrder.every((item, i) => item.order === i + 1);

        return (
          <div className="space-y-8 animate-fade-in max-w-6xl mx-auto">
            <div className="text-center mb-4">
              <h2 className="text-3xl font-bold text-indigo-700 dark:text-indigo-400">While-Listening: La Aventura</h2>
              <p className="text-slate-600 dark:text-slate-400 mt-2">Escucha la conversación y completa las actividades al mismo tiempo.</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <div className="space-y-4 lg:sticky lg:top-24 self-start">
                <Card className="bg-gradient-to-br from-indigo-900 to-slate-900 border-none shadow-2xl relative overflow-hidden h-full flex flex-col">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                  <div className="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                  
                  <div className="relative z-10 flex flex-col items-center flex-1">
                    <div className="w-full flex-1 min-h-[300px] max-h-[400px] bg-slate-800/50 rounded-xl p-6 mb-6 overflow-y-auto border border-white/10 backdrop-blur-sm shadow-inner custom-scrollbar">
                      {STORY_SCRIPT.map((line, i) => (
                        <div key={i} className={`mb-4 transition-all duration-500 ${currentLineIndex === i ? 'opacity-100 scale-105' : 'opacity-40'} ${currentLineIndex > i ? 'opacity-70' : ''}`}>
                          <span className={`font-bold mr-2 ${line.speaker === 'Max' ? 'text-cyan-400' : 'text-pink-400'}`}>
                            {line.speaker}:
                          </span>
                          <span className="text-slate-200 text-lg leading-relaxed">
                            {line.text.split(' ').map((word, wIdx) => (
                              <span 
                                key={wIdx} 
                                onClick={() => isPlaying ? handleKeywordClick(word) : null}
                                className={`cursor-pointer transition-colors duration-200 ${isPlaying ? 'hover:text-amber-400' : ''}`}
                              >
                                {word}{' '}
                              </span>
                            ))}
                          </span>
                        </div>
                      ))}
                      {currentLineIndex === -1 && (
                        <div className="h-full flex items-center justify-center text-slate-400 text-lg text-center">
                          Presiona Play para comenzar...
                        </div>
                      )}
                    </div>

                    <div className="w-full bg-white/10 backdrop-blur-md rounded-2xl px-6 py-4 flex items-center gap-4">
                      <button 
                        onClick={isPlaying ? stopAudio : startAudio}
                        className="w-14 h-14 shrink-0 bg-white text-indigo-900 rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg text-2xl"
                      >
                        {isPlaying ? <i className="fa-solid fa-pause"></i> : <i className="fa-solid fa-play ml-1"></i>}
                      </button>
                      
                      <div className="flex-1 space-y-2">
                        <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                          <div 
                            className="h-full bg-gradient-to-r from-cyan-400 to-indigo-500 transition-all duration-300"
                            style={{ width: `${audioProgress}%` }}
                          />
                        </div>
                        <div className="flex justify-between text-xs font-semibold text-slate-300">
                          <span>Velocidad: {playbackRate}x</span>
                          <div className="flex gap-2">
                            <button onClick={() => setPlaybackRate(0.75)} className={`hover:text-white ${playbackRate===0.75?'text-cyan-400':''}`}>0.75</button>
                            <button onClick={() => setPlaybackRate(1)} className={`hover:text-white ${playbackRate===1?'text-cyan-400':''}`}>1.0</button>
                            <button onClick={() => setPlaybackRate(1.25)} className={`hover:text-white ${playbackRate===1.25?'text-cyan-400':''}`}>1.25</button>
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="mt-4 text-center w-full">
                      <p className="text-sm text-cyan-200/80 mb-2 font-medium tracking-wide">RETO DE PALABRAS OCULTAS</p>
                      <div className="flex gap-2 justify-center flex-wrap">
                        {targetKeywords.map(k => (
                          <span key={k} className={`text-xs px-2 py-1 rounded-full border ${foundKeywords.includes(k) ? 'bg-amber-500/20 text-amber-300 border-amber-500/50 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'bg-white/5 text-white/40 border-white/10'}`}>
                            {foundKeywords.includes(k) ? k : '???'}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>
                </Card>
              </div>

              <div className="space-y-8 max-h-[750px] overflow-y-auto pr-2 custom-scrollbar pb-10">
                <div>
                  <h3 className="text-xl font-bold text-indigo-600 dark:text-indigo-300 mb-4 flex items-center gap-2">
                    <i className="fa-regular fa-circle-check"></i> Actividad 1: Opción Múltiple
                  </h3>
                  <div className="space-y-4">
                    {MCQ_DATA.map((q, qIndex) => (
                      <Card key={qIndex} className="transition-all duration-300 shadow-sm border-l-4 border-l-indigo-500">
                        <p className="font-bold text-md mb-3 text-slate-800 dark:text-slate-200">{qIndex + 1}. {q.q}</p>
                        <div className="grid grid-cols-1 gap-2">
                          {q.options.map((opt, oIndex) => {
                            const isSelected = mcqAnswers[qIndex] === oIndex;
                            const isCorrect = MCQ_DATA[qIndex].correct === oIndex;
                            const showResult = mcqAnswers[qIndex] !== undefined;
                            
                            let btnClass = "bg-slate-50 border-slate-200 text-slate-700 hover:bg-indigo-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300";
                            if (showResult) {
                              if (isCorrect) btnClass = "bg-emerald-100 border-emerald-500 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300 scale-[1.02] shadow-md shadow-emerald-200/50";
                              else if (isSelected) btnClass = "bg-red-100 border-red-500 text-red-800 dark:bg-red-900/40 dark:text-red-300";
                              else btnClass = "opacity-50 pointer-events-none";
                            }

                            return (
                              <button
                                key={oIndex}
                                disabled={showResult}
                                onClick={() => handleAnswer(qIndex, oIndex)}
                                className={`p-2.5 rounded-xl border-2 text-left transition-all text-sm font-medium flex justify-between items-center ${btnClass}`}
                              >
                                {opt}
                                {showResult && isCorrect && <i className="fa-regular fa-circle-check text-lg text-emerald-500 shrink-0 ml-2"></i>}
                                {showResult && isSelected && !isCorrect && <i className="fa-regular fa-circle-xmark text-lg text-red-500 shrink-0 ml-2"></i>}
                              </button>
                            );
                          })}
                        </div>
                      </Card>
                    ))}
                  </div>
                </div>

                <div className="pt-6 border-t-2 border-slate-200 dark:border-slate-700">
                  <h3 className="text-xl font-bold text-indigo-600 dark:text-indigo-300 mb-4 flex items-center gap-2">
                    <i className="fa-solid fa-chart-line"></i> Actividad 2: Cronología
                  </h3>
                  <p className="text-sm text-slate-600 dark:text-slate-400 mb-4">Pon los eventos en el orden cronológico correcto según los vayas escuchando.</p>
                  <div className="space-y-3">
                    {timelineOrder.map((item, index) => (
                      <Card key={item.id} className="!p-3 flex items-center gap-3 bg-white dark:bg-slate-800 transform transition-transform hover:scale-[1.02] border-l-4 border-l-cyan-500">
                        <div className="flex flex-col gap-1">
                          <button 
                            onClick={() => moveItem(index, 'up')} 
                            disabled={index === 0 || isTimelineCorrect}
                            className="p-1 rounded bg-slate-100 hover:bg-indigo-100 disabled:opacity-30 dark:bg-slate-700 dark:hover:bg-indigo-900 transition-colors"
                          >
                            <i className="fa-solid fa-chevron-up text-xs text-slate-600 dark:text-slate-300"></i>
                          </button>
                          <button 
                            onClick={() => moveItem(index, 'down')} 
                            disabled={index === timelineOrder.length - 1 || isTimelineCorrect}
                            className="p-1 rounded bg-slate-100 hover:bg-indigo-100 disabled:opacity-30 dark:bg-slate-700 dark:hover:bg-indigo-900 transition-colors"
                          >
                            <i className="fa-solid fa-chevron-down text-xs text-slate-600 dark:text-slate-300"></i>
                          </button>
                        </div>
                        <div className="flex-1 text-left font-medium text-sm md:text-base text-slate-800 dark:text-slate-200 leading-tight">
                          {item.text}
                        </div>
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 ${isTimelineCorrect ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/50 dark:text-emerald-400' : 'bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-300'}`}>
                          {index + 1}
                        </div>
                      </Card>
                    ))}
                  </div>
                  <div className="mt-4 flex justify-end">
                    <Button onClick={checkTimelineOrder} disabled={isTimelineCorrect} variant={isTimelineCorrect ? 'success' : 'primary'}>
                      {isTimelineCorrect ? '¡Orden Correcto!' : 'Verificar Orden'}
                    </Button>
                  </div>
                </div>

              </div>
            </div>

            <div className="flex justify-end pt-4 mt-4 border-t border-slate-200 dark:border-slate-700">
              <Button onClick={() => { stopAudio(); setCurrentScreen('post-1'); }} variant="primary">
                Siguiente: Post-Listening <i className="fa-solid fa-arrow-right ml-2"></i>
              </Button>
            </div>
          </div>
        );
      };

      const validateText = (text) => {
        const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;
        let errors = [];
        let score = 100;
        
        if (wordCount < 30) { errors.push(`Muy corto. Escribe ${30 - wordCount} palabras más.`); score -= 50; }
        if (wordCount > 50) { errors.push(`Muy largo. Elimina ${wordCount - 50} palabras.`); score -= 50; }
        
        const pastVerbs = ['went', 'bought', 'played', 'was', 'were', 'started', 'talked', 'ran', 'found', 'lost'];
        const hasPastVerbs = pastVerbs.some(v => text.toLowerCase().includes(v));
        if (!hasPastVerbs) { errors.push("Intenta usar más verbos en pasado (went, played, was)."); score -= 20; }

        return { valid: errors.length === 0, errors, wordCount, score: Math.max(0, score) };
      };

      const renderPost1 = () => {
        const handleTextChange = (q, val) => setReflections({ ...reflections, [q]: val });

        const handleSubmit = () => {
          const v1 = validateText(reflections.q1);
          const v2 = validateText(reflections.q2);
          const v3 = validateText(reflections.q3);

          if (v1.valid && v2.valid && v3.valid) {
            showToast("¡Reflexión completada bellamente!", 30);
            setCurrentScreen('post-2');
          } else {
            playSound('error');
            setToastMsg("Por favor corrige los errores en tu texto antes de enviarlo.");
          }
        };

        const renderTextarea = (qKey, questionStr) => {
          const text = reflections[qKey];
          const { wordCount, errors } = validateText(text);
          const isOk = wordCount >= 30 && wordCount <= 50;

          return (
            <Card className="flex flex-col space-y-3">
              <label className="font-bold text-slate-800 dark:text-slate-200">{questionStr}</label>
              <textarea 
                value={text}
                onChange={(e) => handleTextChange(qKey, e.target.value)}
                placeholder="Escribe tu respuesta aquí en inglés (30-50 palabras)..."
                className="w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:border-indigo-500 focus:ring-0 resize-none h-32 text-slate-700 dark:text-slate-300 transition-colors"
              />
              <div className="flex justify-between items-center text-sm">
                <span className={`font-semibold ${isOk ? 'text-emerald-500' : 'text-amber-500'}`}>
                  Palabras: {wordCount}/50 (Min 30)
                </span>
                {text.length > 0 && errors.length > 0 && (
                  <span className="text-red-500 flex items-center gap-1">
                    <i className="fa-solid fa-circle-exclamation"></i> {errors[0]}
                  </span>
                )}
              </div>
            </Card>
          );
        };

        return (
          <div className="space-y-6 animate-fade-in max-w-3xl mx-auto">
            <h2 className="text-2xl font-bold text-indigo-700 dark:text-indigo-400">Post-Listening: Reflexión</h2>
            <p className="text-slate-600 dark:text-slate-400 mb-6 bg-amber-50 dark:bg-amber-900/20 p-4 rounded-lg border-l-4 border-amber-500">
              <strong>Importante:</strong> Cada respuesta debe contener entre <strong>30 y 50 palabras</strong>. El sistema verificará tu gramática automáticamente.
            </p>

            {renderTextarea('q1', '1. Which part of the story was the easiest to understand?')}
            {renderTextarea('q2', '2. Which part was the most difficult?')}
            {renderTextarea('q3', '3. What can you do to improve your listening next time?')}

            <div className="flex justify-end pt-4">
              <Button onClick={handleSubmit}>Enviar Reflexión</Button>
            </div>
          </div>
        );
      };

      const renderPost2 = () => {
        const handleWordClick = (wordObj) => {
          if (sortedWords.regular.includes(wordObj) || sortedWords.irregular.includes(wordObj) || sortedWords.connector.includes(wordObj)) {
            setSortedWords({
              regular: sortedWords.regular.filter(w => w.id !== wordObj.id),
              irregular: sortedWords.irregular.filter(w => w.id !== wordObj.id),
              connector: sortedWords.connector.filter(w => w.id !== wordObj.id),
            });
            return;
          }
          setPost2SelectedWord(wordObj.id === post2SelectedWord ? null : wordObj.id);
        };

        const handleCategoryClick = (catType) => {
          if (!post2SelectedWord) return;
          const wordObj = WORDS_TO_SORT.find(w => w.id === post2SelectedWord);
          
          if (wordObj.type === catType) {
            setSortedWords({
              ...sortedWords,
              [catType]: [...sortedWords[catType], wordObj]
            });
            setPost2SelectedWord(null);
            showToast("¡Categoría Correcta!", 5);
            
            const totalSorted = sortedWords.regular.length + sortedWords.irregular.length + sortedWords.connector.length + 1;
            if (totalSorted === WORDS_TO_SORT.length) {
              awardBadge('Narrative Master');
            }
          } else {
            playSound('error');
            setPost2SelectedWord(null);
          }
        };

        const unsortedWords = WORDS_TO_SORT.filter(w => 
          !sortedWords.regular.includes(w) && !sortedWords.irregular.includes(w) && !sortedWords.connector.includes(w)
        );

        const isComplete = unsortedWords.length === 0;

        return (
          <div className="space-y-6 animate-fade-in text-center">
            <h2 className="text-2xl font-bold text-indigo-700 dark:text-indigo-400">Actividad 2: Detective de Idiomas</h2>
            <p className="text-slate-600 dark:text-slate-400">Toca una palabra, luego toca la caja de la categoría correcta abajo.</p>

            <div className="flex flex-wrap justify-center gap-3 my-8 min-h-[60px]">
              {unsortedWords.map(w => (
                <button
                  key={w.id}
                  onClick={() => handleWordClick(w)}
                  className={`px-4 py-2 rounded-xl font-bold shadow-sm transition-transform ${post2SelectedWord === w.id ? 'bg-indigo-600 text-white scale-110 shadow-indigo-300' : 'bg-white text-slate-700 border-2 border-slate-200 hover:border-indigo-400 dark:bg-slate-700 dark:text-slate-200 dark:border-slate-600'}`}
                >
                  {w.word}
                </button>
              ))}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              {[
                { id: 'regular', title: 'Regular Past Verbs', color: 'emerald' },
                { id: 'irregular', title: 'Irregular Past Verbs', color: 'amber' },
                { id: 'connector', title: 'Narrative Connectors', color: 'cyan' }
              ].map(cat => (
                <div 
                  key={cat.id}
                  onClick={() => handleCategoryClick(cat.id)}
                  className={`border-4 rounded-3xl p-6 min-h-[200px] cursor-pointer transition-all duration-300 flex flex-col items-center
                    ${post2SelectedWord ? `border-${cat.color}-300 hover:border-${cat.color}-500 bg-${cat.color}-50 dark:bg-${cat.color}-900/20` : `border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800`}`}
                >
                  <h3 className={`font-bold text-lg mb-4 text-${cat.color}-600 dark:text-${cat.color}-400`}>{cat.title}</h3>
                  <div className="flex flex-col gap-2 w-full">
                    {sortedWords[cat.id].map(w => (
                      <div key={w.id} onClick={(e) => { e.stopPropagation(); handleWordClick(w); }} className={`bg-${cat.color}-100 text-${cat.color}-800 dark:bg-${cat.color}-900/50 dark:text-${cat.color}-200 px-3 py-2 rounded-lg font-medium text-center shadow-sm cursor-pointer hover:opacity-75`}>
                        {w.word}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div className="flex justify-end pt-8">
              <Button onClick={() => setCurrentScreen('post-3')} disabled={!isComplete} variant={isComplete ? 'primary' : 'outline'}>
                Actividad Final <i className="fa-solid fa-arrow-right ml-1"></i>
              </Button>
            </div>
          </div>
        );
      };

      const renderPost3 = () => {
        const evaluateWithAi = async () => {
          if(!adventureText.p1 || !adventureText.p2 || !adventureText.p3 || !adventureText.p4) {
            setToastMsg("Por favor completa todos los espacios de la historia primero.");
            return;
          }
          
          setIsGeneratingAi(true);
          const fullStory = `Last weekend, I ${adventureText.p1}. First, I ${adventureText.p2}. Suddenly, ${adventureText.p3}. In the end, ${adventureText.p4}.`;
          
          const prompt = `Actúa como un amigable profesor de inglés. Tu estudiante de nivel A2 escribió esta historia: "${fullStory}".
          Por favor evalúa su gramática (enfocándote en el uso correcto de tiempos pasados y estructura).
          Devuelve la respuesta estrictamente en este formato JSON:
          {
            "score": <un número entero del 0 al 100>,
            "feedback": "<Tu retroalimentación en español, animando al estudiante y explicando sus errores gramaticales de manera sencilla>",
            "corrections": "<La historia completamente corregida en inglés>"
          }`;

          try {
            const result = await callGemini(prompt, true);
            setAiEvaluation(result);
            
            if (result.score > 70) {
              awardBadge('A2 Adventure Champion');
            }
            showToast("¡Historia evaluada por Inteligencia Artificial!", result.score || 50);
          } catch (error) {
            console.error(error);
            setToastMsg("Error al conectar con la IA de Gemini. Intenta de nuevo.");
          }
          setIsGeneratingAi(false);
        };

        const extendStoryWithAi = async () => {
          setIsExtendingStory(true);
          const correctedStory = aiEvaluation?.corrections || `Last weekend, I ${adventureText.p1}. First, I ${adventureText.p2}. Suddenly, ${adventureText.p3}. In the end, ${adventureText.p4}.`;
          
          const prompt = `La historia original es: "${correctedStory}".
          Actúa como un narrador creativo y escribe una pequeña y divertida continuación de 2-3 oraciones a esta historia en inglés (nivel A2). Termina con una pregunta para el estudiante.`;

          try {
            const result = await callGemini(prompt, false);
            setAiExtendedStory(result);
          } catch (error) {
            setToastMsg("Error al conectar con la IA de Gemini.");
          }
          setIsExtendingStory(false);
        };

        const handleTextChange = (field, value) => {
          setAdventureText(prev => ({ ...prev, [field]: value }));
        };

        return (
          <div className="space-y-6 animate-fade-in max-w-3xl mx-auto text-center">
            <h2 className="text-2xl font-bold text-indigo-700 dark:text-indigo-400">Actividad 3: Crea Tu Propia Aventura</h2>
            <p className="text-slate-600 dark:text-slate-400">Completa la historia usando verbos en pasado y tu imaginación.</p>

            <Card className="text-left space-y-6 bg-gradient-to-br from-indigo-50 to-white dark:from-slate-800 dark:to-slate-900 text-lg shadow-xl relative">
              
              <div className="flex flex-col md:flex-row md:items-baseline gap-2">
                <span className="font-bold text-slate-800 dark:text-slate-200">Last weekend, I</span>
                <input 
                  type="text"
                  value={adventureText.p1}
                  onChange={(e) => handleTextChange('p1', e.target.value)}
                  disabled={aiEvaluation !== null}
                  className="flex-1 bg-transparent border-b-2 border-indigo-300 dark:border-indigo-600 focus:border-indigo-600 focus:outline-none px-2 py-1 text-indigo-800 dark:text-indigo-300 font-medium disabled:opacity-70 disabled:border-slate-300"
                  placeholder="went to..."
                />
                <span className="font-bold text-slate-800 dark:text-slate-200">.</span>
              </div>

              <div className="flex flex-col md:flex-row md:items-baseline gap-2">
                <span className="font-bold text-slate-800 dark:text-slate-200">First, I</span>
                <input 
                  type="text"
                  value={adventureText.p2}
                  onChange={(e) => handleTextChange('p2', e.target.value)}
                  disabled={aiEvaluation !== null}
                  className="flex-1 bg-transparent border-b-2 border-indigo-300 dark:border-indigo-600 focus:border-indigo-600 focus:outline-none px-2 py-1 text-indigo-800 dark:text-indigo-300 font-medium disabled:opacity-70 disabled:border-slate-300"
                  placeholder="packed my bags..."
                />
                <span className="font-bold text-slate-800 dark:text-slate-200">.</span>
              </div>

              <div className="flex flex-col md:flex-row md:items-baseline gap-2">
                <span className="font-bold text-slate-800 dark:text-slate-200">Suddenly,</span>
                <input 
                  type="text"
                  value={adventureText.p3}
                  onChange={(e) => handleTextChange('p3', e.target.value)}
                  disabled={aiEvaluation !== null}
                  className="flex-1 bg-transparent border-b-2 border-indigo-300 dark:border-indigo-600 focus:border-indigo-600 focus:outline-none px-2 py-1 text-indigo-800 dark:text-indigo-300 font-medium disabled:opacity-70 disabled:border-slate-300"
                  placeholder="it started to rain..."
                />
                <span className="font-bold text-slate-800 dark:text-slate-200">.</span>
              </div>

              <div className="flex flex-col md:flex-row md:items-baseline gap-2">
                <span className="font-bold text-slate-800 dark:text-slate-200">In the end,</span>
                <input 
                  type="text" 
                  value={adventureText.p4}
                  onChange={(e) => handleTextChange('p4', e.target.value)}
                  disabled={aiEvaluation !== null}
                  className="flex-1 bg-transparent border-b-2 border-indigo-300 dark:border-indigo-600 focus:border-indigo-600 focus:outline-none px-2 py-1 text-indigo-800 dark:text-indigo-300 font-medium disabled:opacity-70 disabled:border-slate-300"
                  placeholder="we stayed home"
                />
                <span className="font-bold text-slate-800 dark:text-slate-200">.</span>
              </div>

              {/* AI EVALUATION SECTION */}
              {aiEvaluation && (
                <div className="mt-8 pt-6 border-t-2 border-slate-200 dark:border-slate-700 animate-fade-in space-y-4">
                  <div className="flex items-center justify-between">
                    <h3 className="font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-2">
                      <i className="fa-solid fa-wand-magic-sparkles"></i> Análisis del Tutor IA (Gemini)
                    </h3>
                    <div className="bg-indigo-100 text-indigo-800 font-bold px-3 py-1 rounded-full text-sm dark:bg-indigo-900 dark:text-indigo-300">
                      Calificación: {aiEvaluation.score}/100
                    </div>
                  </div>
                  
                  <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl text-slate-700 dark:text-slate-300 text-base leading-relaxed border-l-4 border-indigo-500">
                    {aiEvaluation.feedback}
                  </div>

                  <div className="bg-emerald-50 dark:bg-emerald-900/20 p-4 rounded-xl border border-emerald-200 dark:border-emerald-800">
                    <p className="text-sm font-semibold text-emerald-800 dark:text-emerald-400 mb-1">Tu historia corregida:</p>
                    <p className="text-slate-800 dark:text-slate-200 italic">"{aiEvaluation.corrections}"</p>
                  </div>

                  {aiExtendedStory ? (
                    <div className="mt-6 bg-purple-50 dark:bg-purple-900/20 p-4 rounded-xl border border-purple-200 dark:border-purple-800 animate-fade-in">
                      <p className="text-sm font-semibold text-purple-800 dark:text-purple-400 mb-2 flex items-center gap-1">
                        <i className="fa-solid fa-book-journal-whills"></i> Continuación de Gemini:
                      </p>
                      <p className="text-slate-800 dark:text-slate-200">"{aiExtendedStory}"</p>
                    </div>
                  ) : (
                    <Button 
                      onClick={extendStoryWithAi} 
                      disabled={isExtendingStory} 
                      variant="outline" 
                      className="w-full mt-4 text-purple-700 border-purple-300 hover:bg-purple-50 dark:text-purple-400 dark:border-purple-700 dark:hover:bg-purple-900/30"
                    >
                      {isExtendingStory ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <i className="fa-solid fa-wand-magic-sparkles text-lg"></i>}
                      {isExtendingStory ? "Imaginando..." : "✨ Extender mi historia con IA"}
                    </Button>
                  )}
                </div>
              )}
            </Card>

            <div className="flex justify-end pt-8 gap-4">
              {!aiEvaluation ? (
                <Button onClick={evaluateWithAi} disabled={isGeneratingAi} variant="ai" className="text-lg px-8 py-4 w-full md:w-auto">
                  {isGeneratingAi ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <i className="fa-solid fa-wand-magic-sparkles text-lg"></i>}
                  {isGeneratingAi ? "Evaluando..." : "✨ Evaluar Historia con IA"}
                </Button>
              ) : (
                <Button onClick={() => setCurrentScreen('dashboard')} variant="success" className="text-lg px-8 py-4 w-full md:w-auto">
                  Finalizar Lección <i className="fa-solid fa-trophy ml-2"></i>
                </Button>
              )}
            </div>
          </div>
        );
      };

      const renderDashboard = () => (
        <div className="space-y-8 animate-fade-in max-w-4xl mx-auto">
          <div className="text-center">
            <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-cyan-500 mb-2">¡Lección Completada!</h2>
            <p className="text-lg text-slate-600 dark:text-slate-400">Aquí hay un resumen de tu desempeño.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <Card className="text-center bg-gradient-to-br from-indigo-500 to-indigo-700 text-white border-none transform hover:scale-105 transition-transform">
              <i className="fa-solid fa-star text-4xl mb-2 text-indigo-200"></i>
              <h3 className="text-lg font-semibold opacity-90">XP Total</h3>
              <p className="text-5xl font-bold">{xp}</p>
            </Card>
            
            <Card className="text-center bg-gradient-to-br from-emerald-400 to-emerald-600 text-white border-none transform hover:scale-105 transition-transform">
              <i className="fa-regular fa-circle-check text-4xl mb-2 text-emerald-200"></i>
              <h3 className="text-lg font-semibold opacity-90">Progreso</h3>
              <p className="text-5xl font-bold">100%</p>
            </Card>

            <Card className="text-center bg-gradient-to-br from-amber-400 to-amber-600 text-white border-none transform hover:scale-105 transition-transform">
              <i className="fa-solid fa-medal text-4xl mb-2 text-amber-200"></i>
              <h3 className="text-lg font-semibold opacity-90">Insignias</h3>
              <p className="text-5xl font-bold">{badges.length}</p>
            </Card>
          </div>

          <Card>
            <h3 className="text-xl font-bold text-slate-800 dark:text-slate-200 mb-6 flex items-center gap-2">
              <i className="fa-solid fa-shield-halved text-indigo-500"></i> Tus Insignias
            </h3>
            <div className="flex flex-wrap gap-4 justify-center">
              {['Story Explorer', 'Listening Detective', 'Narrative Master', 'A2 Adventure Champion'].map(badge => {
                const hasBadge = badges.includes(badge);
                return (
                  <div key={badge} className={`flex flex-col items-center p-4 rounded-xl border-2 w-40 text-center transition-all ${hasBadge ? 'bg-amber-50 border-amber-300 dark:bg-amber-900/30 dark:border-amber-700' : 'bg-slate-50 border-slate-200 opacity-50 grayscale dark:bg-slate-800 dark:border-slate-700'}`}>
                    <i className={`fa-solid fa-trophy text-3xl mb-2 ${hasBadge ? 'text-amber-500' : 'text-slate-400'}`}></i>
                    <span className={`font-semibold text-sm ${hasBadge ? 'text-amber-800 dark:text-amber-400' : 'text-slate-500'}`}>{badge}</span>
                  </div>
                );
              })}
            </div>
          </Card>

          <div className="flex justify-center mt-8">
            <Button onClick={() => window.location.reload()} variant="outline">
              <i className="fa-solid fa-rotate-left mr-2"></i> Empezar de Nuevo
            </Button>
          </div>
        </div>
      );

      const renderCurrentScreen = () => {
        switch (currentScreen) {
          case 'home': return renderHome();
          case 'pre-1': return renderPre1();
          case 'pre-2': return renderPre2();
          case 'listen-audio': return renderAudioPlayer();
          case 'post-1': return renderPost1();
          case 'post-2': return renderPost2();
          case 'post-3': return renderPost3();
          case 'dashboard': return renderDashboard();
          default: return renderHome();
        }
      };

      return (
        <div className={`min-h-screen font-sans transition-colors duration-300 ${theme === 'dark' ? 'dark bg-slate-900' : 'bg-slate-50'}`}>
          <Confetti active={showConfetti} />
          
          {toastMsg && (
            <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-bounce font-medium text-lg flex items-center gap-2">
              <i className="fa-solid fa-star text-amber-400"></i> {toastMsg}
            </div>
          )}

          <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 py-2 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <i className="fa-solid fa-mountain text-2xl text-indigo-600 dark:text-indigo-400"></i>
                <span className="font-bold text-slate-800 dark:text-white hidden sm:inline">Listening Lab</span>
                
                <div className="flex bg-slate-100 dark:bg-slate-900 rounded-lg p-1 ml-4 border border-slate-200 dark:border-slate-700">
                  {[
                    { id: 'mobile', icon: 'fa-solid fa-mobile-screen', label: 'Mobile' },
                    { id: 'tablet', icon: 'fa-solid fa-tablet-screen-button', label: 'Tablet' },
                    { id: 'desktop', icon: 'fa-solid fa-desktop', label: 'Desktop' }
                  ].map(view => (
                    <button
                      key={view.id}
                      onClick={() => setDeviceView(view.id)}
                      title={view.label}
                      className={`p-1.5 rounded-md transition-colors ${deviceView === view.id ? 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600 dark:text-indigo-400' : 'text-slate-500 hover:text-slate-800 dark:hover:text-slate-300'}`}
                    >
                      <i className={`${view.icon} w-4 h-4 text-center`}></i>
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-full border border-indigo-100 dark:border-indigo-800">
                  <i className="fa-solid fa-star text-sm text-amber-500"></i>
                  <span className="font-bold text-indigo-700 dark:text-indigo-300">{xp} XP</span>
                </div>
                
                <button onClick={() => setSoundEnabled(!soundEnabled)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full text-xl">
                  {soundEnabled ? <i className="fa-solid fa-volume-high"></i> : <i className="fa-solid fa-volume-xmark"></i>}
                </button>
                
                <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full text-xl">
                  {theme === 'dark' ? <i className="fa-solid fa-sun"></i> : <i className="fa-solid fa-moon"></i>}
                </button>
              </div>
            </div>
          </div>

          <div className="p-4 sm:p-8 pt-8">
            <div className={`transition-all duration-500 ease-in-out ${getContainerClass()} bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-10 min-h-[80vh] relative`}>
              
              {currentScreen !== 'home' && currentScreen !== 'dashboard' && (
                <div className="flex flex-wrap justify-between items-center mb-8 gap-4 text-sm font-semibold text-slate-400">
                  <span className={currentScreen.startsWith('pre') ? 'text-indigo-600 dark:text-indigo-400' : ''}>1. Pre-Listening</span>
                  <i className="fa-solid fa-arrow-right text-xs"></i>
                  <span className={currentScreen.startsWith('listen') ? 'text-indigo-600 dark:text-indigo-400' : ''}>2. While-Listening</span>
                  <i className="fa-solid fa-arrow-right text-xs"></i>
                  <span className={currentScreen.startsWith('post') ? 'text-indigo-600 dark:text-indigo-400' : ''}>3. Post-Listening</span>
                </div>
              )}

              {renderCurrentScreen()}

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
